type Contract @model @auth(rules: [{allow: public}]) {
  id: ID!

  contractType: ContractTypes!
    @index(name: "byContractType", queryField: "contractsByType")
  contractNumber: String
  @index(name: "byContractNumber", queryField: "contractsByNumber")
  name: String
    @index(name: "byContractName", queryField: "contractsByName")
  location: String
  commodity: String
  originalQuantity: Float
  contractDate: AWSDate
  remainingQuantity: Float
  netDollars: Float
  contractDue: AWSDate
  closedDate: AWSDate
   @index(name: "byClosedDate", queryField: "contractsByClosedDate")
  closedBy: String
  canceledDate: AWSDate
  settlementReference: String
  markforReview: Boolean
  locked: Boolean  
  pictureKey: String
  transactionKey: String
  transactionKeyPages: Int
  addendumKey1: String
  addendumKey2: String
  duplicateKey: AWSJSON
  notes: String
  TransactionDates: AWSJSON
  }
  enum ContractTypes {
  BASIS_FIXED
  DEFERRED_PAYMENT
  PRICE_LATER
  EXTENDED_PRICING
  CASH_BUY
  MINIMUM_PRICED
  HEDGED_TO_ARRIVE
  UNASSIGNED
}

