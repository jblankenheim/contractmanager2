type TransactionDate @model @auth(rules: [{allow: public}]) {
  id: ID!
  date: AWSDate
  JSON: AWSJSON
  remainingBushels: Float
  remainingDollars: Float
  contractID: ID! @index(name: "byContract")
}

enum ContractTypes {
  DEFERRED_PAYMENT
  PRICED_LATER
  EXTENDED_PRICING
  CASH_BUY
  MINIMUM_PRICE
  UNASSIGNED
}

type Contract @model @auth(rules: [{allow: public}]) {
  id: ID!

  contractType: ContractTypes!
    @index(name: "byContractType", queryField: "contractsByType")
  contractNumber: String
  @index(name: "byContractNumber", queryField: "contractsByNumber")
  contractName: String
    @index(name: "byContractName", queryField: "contractsByName")
  contractLocation: String
  contractBushels: String
  contractDollars: Float
  remainingBushels: Float
  remainingDollars: Float
  closedDate: AWSDate
  closedBy: String
  markforReview: Boolean
  settlementReference: String
  pictureKey: String
  addendumKey1: String
  addendumKey2: String
  duplicateKey: AWSJSON
  TransactionDates: [TransactionDate] @hasMany(indexName: "byContract", fields: ["id"])
}